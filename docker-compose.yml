# OpenDeepSeek - docker-compose.yml
# Version: v0.6.0 — genspark-proxy 架构 (淘汰 BigBat)
# 架构: Open WebUI → Smart Bridge → LLM Proxy → genspark-proxy (host 网络) → genspark.ai

services:
  # ═══════════════════════════════════════════════════════════════════════
  # genspark-proxy — 新一代 GenSpark AI 反向代理 (Python FastAPI)
  # 完整的模型列表、请求排队、限流重试、ReCaptcha 绕过
  # ═══════════════════════════════════════════════════════════════════════
  genspark-proxy:
    build:
      context: ./proxy
      dockerfile: Dockerfile
    image: opendeepseek-genspark-proxy:local
    container_name: opendeepseek-genspark-proxy
    restart: always
    network_mode: "host"
    environment:
      - PYTHONUNBUFFERED=1
      - PORT=7056
      - API_SECRET=${API_SECRET:-your-api-key-here}
      - GS_COOKIE=${GS_COOKIE:-}
      - GS_COOKIES_JSON=${GS_COOKIES_JSON:-}
      - DEBUG=${DEBUG:-false}
      - PROXY_URL=
      - RECAPTCHA_PROXY_URL=
      - REQUEST_RATE_LIMIT=60
      - RATE_LIMIT_COOKIE_LOCK_DURATION=300
      - AUTO_MODEL_CHAT_MAP_TYPE=1
      - REASONING_HIDE=0
    volumes:
      - proxy-data:/app/data

  # ═══════════════════════════════════════════════════════════════════════
  # genspark2api — 新一代 GenSpark AI 反向代理 (Go, deanxv 项目)
  # 支持所有 AI 模型、cookie 池、自动重试、ReCaptcha 绕过
  # ═══════════════════════════════════════════════════════════════════════
  genspark2api:
    image: deanxv/genspark2api:latest
    container_name: opendeepseek-genspark2api
    profiles:
      - "extra"
    restart: always
    network_mode: "host"
    environment:
      - PORT=7059
      - API_SECRET=${API_SECRET:-your-api-key-here}
      - GS_COOKIE=${GS_COOKIE}
      - PROXY_URL=http://127.0.0.1:7777
      - RECAPTCHA_PROXY_URL=
      - REQUEST_RATE_LIMIT=60
      - RATE_LIMIT_COOKIE_LOCK_DURATION=300
      - AUTO_MODEL_CHAT_MAP_TYPE=1
      - REASONING_HIDE=0
      - AUTO_DEL_CHAT=0
      - TZ=Asia/Shanghai
    volumes:
      - genspark2api-data:/app/genspark2api/data

  # ═══════════════════════════════════════════════════════════════════════
  # BigBat — Genspark AI reverse proxy (Go, ai_chat 端点, 旧架构)
  # ═══════════════════════════════════════════════════════════════════════
  bigbat:
    build:
      context: ./bigbat
      dockerfile: Dockerfile
    image: opendeepseek-bigbat:local
    container_name: opendeepseek-bigbat
    restart: always
    network_mode: "host"
    env_file:
      - ./bigbat/.env
    volumes:
      - bigbat-data:/app/data

  # ═══════════════════════════════════════════════════════════════════════
  # LLM Proxy — 模型名称映射层
  # 将用户友好的模型名映射到 genspark-proxy 上游模型名
  # ═══════════════════════════════════════════════════════════════════════
  llm-proxy:
    build:
      context: ./bridge
      dockerfile: Dockerfile.proxy
    image: opendeepseek-llm-proxy:local
    container_name: opendeepseek-llm-proxy
    restart: unless-stopped
    ports:
      - "${BIND_HOST:-127.0.0.1}:8000:8000"
    environment:
      - UPSTREAM_URL=http://host.docker.internal:7056/v1
      - UPSTREAM_KEY=${OPDS_LLM_API_KEY:-your-api-key-here}
      - PROXY_API_KEY=${OPDS_LLM_API_KEY:-your-api-key-here}
      - RATE_LIMIT_WINDOW=60
      - RATE_LIMIT_MAX=60
      - RATE_LIMIT_BURST=120
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./bridge/llm_proxy.py:/app/llm_proxy.py:ro
    networks:
      - opendeepseek-network
    depends_on:
      - genspark-proxy

  # ═══════════════════════════════════════════════════════════════════════
  # Ollama — 本地工具调用推理引擎 (qwen2.5:3b 支持 function calling)
  # ═══════════════════════════════════════════════════════════════════════
  ollama:
    image: ollama/ollama:latest
    container_name: opendeepseek-ollama
    restart: unless-stopped
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_KEEP_ALIVE=5m
      - OLLAMA_CONTEXT_LENGTH=65536
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - opendeepseek-network
    cpus: "${OLLAMA_CPUS:-4.0}"
    mem_limit: "${OLLAMA_MEMORY_LIMIT:-8192m}"

  # ═══════════════════════════════════════════════════════════════════════
  # Hermes Agent v0.11
  # ═══════════════════════════════════════════════════════════════════════
  hermes:
    image: nousresearch/hermes-agent:v2026.6.5
    container_name: opendeepseek-hermes
    command: gateway run
    network_mode: "host"
    environment:
      - DEEPSEEK_API_KEY=${OPDS_LLM_API_KEY:-your-api-key-here}
      - DEEPSEEK_API_BASE=http://127.0.0.1:8000/v1
      - HERMES_INFERENCE_PROVIDER=custom
      - OPDS_LLM_PROVIDER=custom
      - OPDS_LLM_BASE_URL=http://127.0.0.1:8000/v1
      - OPDS_LLM_API_KEY=${OPDS_LLM_API_KEY:-your-api-key-here}
      - OPDS_LLM_MODEL=GPT-5.4
      - OPDS_LLM_PRO_MODEL=GPT-5.5 Pro
      - OPENAI_API_KEY=${OPDS_LLM_API_KEY:-your-api-key-here}
      - OPENAI_BASE_URL=http://127.0.0.1:8000/v1
      - CUSTOM_MODEL_BASE_URL=http://127.0.0.1:8000/v1
      - CUSTOM_MODEL_API_KEY=${OPDS_LLM_API_KEY:-your-api-key-here}
      - CUSTOM_MODEL_NAME=GPT-5.4
      - DEFAULT_MODEL=GPT-5.4
      - HERMES_MODEL=GPT-5.4
      - HERMES_DEFAULT_MODEL=GPT-5.4
      - HERMES_MAX_ITERATIONS=${HERMES_MAX_ITERATIONS:-24}
      - HERMES_API_TIMEOUT=${HERMES_API_TIMEOUT:-300}
      - HERMES_API_CALL_STALE_TIMEOUT=${HERMES_API_CALL_STALE_TIMEOUT:-120}
      - API_SERVER_ENABLED=true
      - "API_SERVER_KEY=${HERMES_API_KEY:?Missing required: HERMES_API_KEY}"
      - API_SERVER_PORT=8642
      - API_SERVER_HOST=0.0.0.0
      - TERMINAL_ENV=local
      - TERMINAL_CWD=/host
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USERS:-}
      - HERMES_TELEGRAM_DISABLE_FALLBACK_IPS=true
      - QQ_APP_ID=${QQ_APP_ID:-}
      - QQ_CLIENT_SECRET=${QQ_CLIENT_SECRET:-}
      - QQ_ALLOW_ALL_USERS=${QQ_ALLOW_ALL_USERS:-true}
      - GATEWAY_ALLOW_ALL_USERS=true
      - HERMES_TELEGRAM_HTTP_CONNECT_TIMEOUT=${HERMES_TELEGRAM_HTTP_CONNECT_TIMEOUT:-30}
      - HERMES_TELEGRAM_HTTP_READ_TIMEOUT=${HERMES_TELEGRAM_HTTP_READ_TIMEOUT:-120}
      - HERMES_TELEGRAM_HTTP_POOL_TIMEOUT=${HERMES_TELEGRAM_HTTP_POOL_TIMEOUT:-60}
      - QQ_PORTAL_HOST=${QQ_PORTAL_HOST:-q.qq.com}
    volumes:
      - hermes-data:/opt/data
      - ${HERMES_HOST_DIR:-./agent-files}:/host:rw
      - ./hermes/skills:/opt/data/skills/opendeepseek:rw
      - ./hermes/SOUL.md:/opt/data/SOUL.md:rw
      - ./hermes/patched/model_metadata.py:/opt/hermes/agent/model_metadata.py:ro
      - ./hermes/health_monitor.py:/opt/hermes/health_monitor.py:ro
      - ./hermes/cont-init.d/99-health-monitor:/etc/cont-init.d/99-health-monitor:ro
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8642/health')\" 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    cpus: "${HERMES_CPUS:-2.0}"
    mem_limit: "${HERMES_MEMORY_LIMIT:-2048m}"
    pids_limit: 256

  # ═══════════════════════════════════════════════════════════════════════
  # Hermes Smart Bridge
  # ═══════════════════════════════════════════════════════════════════════
  hermes-bridge:
    build:
      context: ./bridge
    container_name: opendeepseek-hermes-bridge
    ports:
      - "${BIND_HOST:-127.0.0.1}:${OPDS_ARTIFACT_PORT:-8770}:8765"
    environment:
      - HERMES_BASE_URL=http://hermes:8642/v1
      - "HERMES_API_KEY=${HERMES_API_KEY:?Missing required: HERMES_API_KEY}"
      - DEEPSEEK_API_KEY=${OPDS_LLM_API_KEY:-your-api-key-here}
      - DEEPSEEK_API_BASE=${OPDS_LLM_BASE_URL:-http://llm-proxy:8000/v1}
      - OPDS_LLM_PROVIDER=custom
      - OPDS_LLM_BASE_URL=${OPDS_LLM_BASE_URL:-http://llm-proxy:8000/v1}
      - OPDS_LLM_API_KEY=${OPDS_LLM_API_KEY:-your-api-key-here}
      - OPDS_LLM_MODEL=${OPDS_LLM_MODEL:-GPT-5.4}
      - OPDS_LLM_PRO_MODEL=${OPDS_LLM_PRO_MODEL:-GPT-5.5-Pro}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-GPT-5.4}
      - ENABLE_LIGHTWEIGHT_ROUTING=${ENABLE_LIGHTWEIGHT_ROUTING:-false}
      - HERMES_AGENT_MAX_TOKENS=${HERMES_AGENT_MAX_TOKENS:-32768}
      - HERMES_AGENT_STREAM=${HERMES_AGENT_STREAM:-false}
      - HERMES_PROGRESS_STREAM=${HERMES_PROGRESS_STREAM:-true}
      - IMAGE_BRIDGE_TIMEOUT=${IMAGE_BRIDGE_TIMEOUT:-600}
      - OPDS_REALTIME_SEARCH_ENABLED=${OPDS_REALTIME_SEARCH_ENABLED:-true}
      - OPDS_REALTIME_SEARCH_URL=${OPDS_REALTIME_SEARCH_URL:-http://searxng:8080/search?q={query}&format=json}
      - OPDS_REALTIME_SEARCH_TIMEOUT=${OPDS_REALTIME_SEARCH_TIMEOUT:-4}
      - OPDS_REALTIME_SEARCH_MAX_RESULTS=${OPDS_REALTIME_SEARCH_MAX_RESULTS:-6}
      - OPDS_AGENT_FALLBACK_TO_LITE=${OPDS_AGENT_FALLBACK_TO_LITE:-true}
      - OPDS_DELEGATE_OPENWEBUI_NATIVE_TOOLS=${OPDS_DELEGATE_OPENWEBUI_NATIVE_TOOLS:-true}
      - OPDS_SHARED_MEMORY_PATH=${OPDS_SHARED_MEMORY_PATH:-/host/OpenDeepSeek-Memory/profile.md}
      - OPDS_MEMORY_SNAPSHOT_MAX_CHARS=${OPDS_MEMORY_SNAPSHOT_MAX_CHARS:-4000}
      - OPDS_HOST_DISPLAY_PREFIX=${HERMES_HOST_DIR:-/host}
      - OPDS_ARTIFACT_ROOT=${OPDS_ARTIFACT_ROOT:-/host/OpenDeepSeek-Outputs}
      - OPDS_ARTIFACT_PUBLIC_BASE_URL=${OPDS_ARTIFACT_PUBLIC_BASE_URL:-http://localhost:8770}
      - OPDS_ARTIFACT_MAX_FILES=${OPDS_ARTIFACT_MAX_FILES:-100}
      - IMAGE_BRIDGE_HOST_ROOT=/host
      - IMAGE_BRIDGE_PUBLIC_HOST_PREFIX=/host
      - IMAGE_BRIDGE_OCR_LANG=chi_sim+eng
    volumes:
      - ${HERMES_HOST_DIR:-./agent-files}:/host:rw
    depends_on:
      hermes:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8765/health')\" 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    cpus: "${BRIDGE_CPUS:-0.5}"
    mem_limit: "${BRIDGE_MEMORY_LIMIT:-256m}"
    pids_limit: 64
    networks:
      - opendeepseek-network

  # ═══════════════════════════════════════════════════════════════════════
  # Open WebUI v0.9.2
  # ═══════════════════════════════════════════════════════════════════════
  open-webui:
    image: ghcr.io/open-webui/open-webui:0.9.2
    container_name: opendeepseek-webui
    ports:
      - "0.0.0.0:3000:8080"
    environment:
      - OPENAI_API_BASE_URL=http://hermes-bridge:8765/v1
      - "OPENAI_API_KEY=${OPDS_LLM_API_KEY:-your-api-key-here}"
      - WEBUI_NAME=OpenDeepSeek
      - WEBUI_BASE_URL=https://usapi.1001001.best
      - "WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:?Missing required: WEBUI_SECRET_KEY}"
      - DEFAULT_LOCALE=zh-CN
      - ENABLE_RAG_HYBRID_SEARCH=${ENABLE_RAG_HYBRID_SEARCH:-false}
      - ENABLE_CODE_INTERPRETER=${ENABLE_CODE_INTERPRETER:-false}
      - WEBUI_AUTH=${WEBUI_AUTH:-false}
      - DEFAULT_MODELS=${DEFAULT_MODELS_FRONTEND:-GPT-5.5-Pro}
      - DEFAULT_PINNED_MODELS=${DEFAULT_PINNED_MODELS:-GPT-5.5-Pro,GPT-5.4,GPT-5.4-Mini,GPT-5.4-Nano,ClaudeSonnet-4.6,Claude-Opus-4.8,DeepSeek-V4-Pro,DeepSeek-V4-Flash,O3-pro,Gemini-3.5-Flash}
      - ENABLE_TITLE_GENERATION=${ENABLE_TITLE_GENERATION:-false}
      - ENABLE_TAGS_GENERATION=${ENABLE_TAGS_GENERATION:-false}
      - ENABLE_FOLLOW_UP_GENERATION=${ENABLE_FOLLOW_UP_GENERATION:-false}
      - 'DEFAULT_PROMPT_SUGGESTIONS=[{"title":["整理我的桌面","真 Agent 文件系统演示"],"content":"请查看 /host/Desktop，但不要移动或删除任何文件。先按类型总结我的桌面有什么，再给我一个整理方案，并把方案写到 /host/OpenDeepSeek-Outputs/desktop-cleanup-plan.md"},{"title":["生成一个网页","一分钟做出可打开作品"],"content":"请在 /host/OpenDeepSeek-Outputs/site 里生成一个单文件中文个人主页 index.html，主题是「我用 DeepSeek V4 + Hermes 做个人 AI 助理」。要求手机端好看，可直接打开。"},{"title":["做一份视频文案","把乱语音变成爆款逻辑"],"content":"我会粘贴一段语音转录。请把它整理成 3 分钟中文视频脚本：开头钩子、痛点、解决方案、演示镜头、结尾号召，并保存到 /host/OpenDeepSeek-Outputs/video-script.md\n\n语音转录："},{"title":["创建真实提醒","Hermes Cron 不是口头答应"],"content":"请创建一个 10 分钟后的提醒：回来检查 OpenDeepSeek 手机上是否好用。请实际使用 cron 工具创建，并告诉我任务 ID。"},{"title":["生成周报草稿","从电脑文件名推工作线索"],"content":"请读取 /host/Desktop 或 /host/Documents 里和本周工作有关的文件名，不读取正文，帮我生成一份周报草稿到 /host/OpenDeepSeek-Outputs/weekly-report.md"},{"title":["记住我的偏好","长期记忆演示"],"content":"请记住：我偏好中文、直接、少废话、要真执行不要只解释。以后相关对话请主动参考这个偏好。"}]'
      - ENABLE_RAG_WEB_SEARCH=${ENABLE_RAG_WEB_SEARCH:-false}
      - SEARXNG_QUERY_URL=http://searxng:8080/search?q=<query>&format=json
    volumes:
      - open-webui-data:/app/backend/data
      - ./webui/custom.css:/app/build/static/custom.css:ro
      - ./webui/loader.js:/app/build/static/loader.js:ro
      - ./webui/pwa-prompt.js:/app/build/static/pwa-prompt.js:ro
      - ./webui/pwa-prompt.css:/app/build/static/pwa-prompt.css:ro
    depends_on:
      hermes-bridge:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    cpus: "${WEBUI_CPUS:-1.0}"
    mem_limit: "${WEBUI_MEMORY_LIMIT:-1024m}"
    pids_limit: 160
    networks:
      - opendeepseek-network

  # ═══════════════════════════════════════════════════════════════════════
  # SearXNG (可选 — 联网搜索后端)
  # ═══════════════════════════════════════════════════════════════════════
  searxng:
    image: searxng/searxng:2026.4.28-ed5955a5c
    container_name: opendeepseek-searxng
    profiles:
      - "full"
    ports:
      - "${BIND_HOST:-127.0.0.1}:8889:8080"
    environment:
      - SEARXNG_PORT=8080
      - SEARXNG_BIND_ADDRESS=0.0.0.0
    volumes:
      - ./searxng:/etc/searxng:rw
    restart: unless-stopped
    cpus: "${SEARXNG_CPUS:-0.5}"
    mem_limit: "${SEARXNG_MEMORY_LIMIT:-384m}"
    pids_limit: 96
    networks:
      - opendeepseek-network

  # ═══════════════════════════════════════════════════════════════════════
  # Proxy Pool — HTTP CONNECT forward proxy with rotating upstream IPs
  # Fetches proxies from lajiao API every 5 minutes, round-robins connections
  # ═══════════════════════════════════════════════════════════════════════
  proxy-pool:
    build:
      context: ./proxy
      dockerfile: Dockerfile
    image: opendeepseek-proxy-pool:local
    container_name: opendeepseek-proxy-pool
    ports:
      - "7777:7777"
    environment:
      - PROXY_API_URL=http://api.lajiaohttp.com/api/extract_ip?regions=US&num=10&protocol=http&type=txt&cate=2&t=10&lt=1
    networks:
      - opendeepseek-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:7777/health')\" 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ═══════════════════════════════════════════════════════════════════════
  # kiro-gateway — 真实多模型路由 (Amazon Q Developer / AWS CodeWhisperer)
  # 支持 Claude Sonnet 4.5, Haiku 4.5, DeepSeek-V3.2, Qwen3-Coder 等
  # ═══════════════════════════════════════════════════════════════════════
  kiro-gateway:
    build:
      context: ./kiro-gateway
      dockerfile: Dockerfile
    image: opendeepseek-kiro-gateway:local
    container_name: opendeepseek-kiro-gateway
    restart: always
    ports:
      - "${BIND_HOST:-127.0.0.1}:7057:8000"
    environment:
      - PROXY_API_KEY=${OPDS_LLM_API_KEY:-your-api-key-here}
      - REFRESH_TOKEN=${KIRO_REFRESH_TOKEN}
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8000
      - LOG_LEVEL=INFO
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - opendeepseek-network

volumes:
  hermes-data:
  open-webui-data:
  bigbat-data:
  proxy-data:
  genspark2api-data:
  ollama-data:
    name: ollama-data

networks:
  opendeepseek-network:
    name: opendeepseek-network
    driver: bridge
